name: Generate Snake Animation

on:
  schedule:
    # Roda automaticamente a cada 24 horas
    - cron: "0 0 * * *" 
  
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a animação da cobrinha
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: andresalidia
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark
          # CONFIGURAÇÃO DE CORES:
          # O primeiro valor (#000000) é o fundo dos quadradinhos vazios
          color_dots: '#000000,#6e4e5b,#a66c87,#ba83b0,#d3a0f7'
          color_snake: '#c47198'

      # Envia o arquivo gerado para o branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
